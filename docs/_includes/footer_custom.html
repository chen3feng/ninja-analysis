<!-- GoatCounter 可见访问计数（全局总数）。
     需在 GoatCounter 后台 Settings 勾选公开计数（visitor counter）。
     若站点未注册或未开启，下面的图片加载失败会自动隐藏，不会留下破图。 -->
<p id="gc-visit-counter"
   style="text-align:center; margin-top:2rem; opacity:0.7; font-size:0.85em;">
  本站访问量
  <img src="https://chen3feng.goatcounter.com/counter/TOTAL.svg"
       alt="" loading="lazy" style="vertical-align:middle;"
       onerror="document.getElementById('gc-visit-counter').style.display='none'">
</p>
