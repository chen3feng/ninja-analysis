name: Deploy Jekyll site

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rewrite source links for Pages
        run: |
          # Read the pinned commit from the ninja submodule
          COMMIT=$(git ls-tree HEAD ninja | awk '{print $3}')
          if [ -z "$COMMIT" ]; then
            echo "::error::Could not read ninja submodule commit. Is it initialized?"
            exit 1
          fi
          echo "ninja submodule pinned at: $COMMIT"
          BASE="https://github.com/ninja-build/ninja/blob/${COMMIT}"
          cd docs
          for f in [0-9]*.md; do
            sed -i \
              -e "s|](\.\./ninja/|](${BASE}/|g" \
              "$f"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
